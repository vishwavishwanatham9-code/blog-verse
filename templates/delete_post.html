<!DOCTYPE html>
<html>
<head>
    <title>Delete Post</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .delete-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        .delete-box h2{
            margin-bottom:25px;
            color:#222;
        }

        .delete-box input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            margin-bottom:20px;
            font-size:16px;
        }

        .delete-box button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:crimson;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .delete-box button:hover{
            background:darkred;
            transform:scale(1.03);
        }

    </style>

</head>

<body>

    <div class="delete-box">

        <h2>Delete Post</h2>

        <form method="POST">

            <input
                type="password"
                name="password"
                placeholder="Enter Admin Password"
                required
            >

            <button type="submit">
                Delete Post
            </button>

        </form>

    </div>

</body>
</html>
